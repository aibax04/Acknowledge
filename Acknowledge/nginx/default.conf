server {
    listen 80;
    server_name localhost postflow.panscience.ai acknowledge.panscience.ai;

    root /usr/share/nginx/html;

    # Allow larger file uploads (50MB)
    client_max_body_size 50M;

    # Backend API proxy: /api/leaves/... -> backend receives /leaves/... (strip /api prefix)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        set $fixed_proto $scheme;
        if ($http_x_forwarded_proto != "") {
            set $fixed_proto $http_x_forwarded_proto;
        }
        proxy_set_header X-Forwarded-Proto $fixed_proto;

        proxy_redirect http:// https://;
        proxy_redirect / /api/;
    }

    # Static assets
    location /static/ {
        alias /usr/share/nginx/html/static/;
        
        # Disable caching for JS files during development
        location ~ \.js$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
        
        # Cache images and CSS for 30 days
        location ~ \.(css|jpg|jpeg|png|gif|ico|svg|webp)$ {
            expires 30d;
        }
    }

    location /favicon.ico {
        root /usr/share/nginx/html/static/img;
        try_files $uri =204;
    }

    # Frontend
    location / {
        index pages/login.html;
        # For general routes, look in root, then pages/, then fallback to login.html
        # But ONLY if it's not a request for a missing file (avoiding HTML on 404)
        try_files $uri $uri/ /pages$uri /pages$uri.html /pages/login.html;
    }
}
