<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acknowledge - Login</title>
    <!-- Using Tailwind via CDN for immediate rendering without build steps -->
    <!-- Using Tailwind via CDN for immediate rendering without build steps -->
    <script>
        // Suppress Tailwind CDN production warning
        const originalWarn = console.warn;
        console.warn = (...args) => {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return;
            originalWarn.apply(console, args);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981', // Emerald 500 - Beautiful Green
                        'primary-hover': '#059669', // Emerald 600
                        'primary-light': '#d1fae5', // Emerald 100
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .slide-container {
            transition: transform 0.5s ease-in-out;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 text-gray-800 h-screen flex items-center justify-center overflow-hidden">

    <!-- Wrapper that holds both screens -->
    <div class="relative w-full max-w-lg h-[650px] overflow-hidden bg-white rounded-2xl shadow-xl">

        <!-- Sliding Content Container -->
        <div id="slideContainer" class="slide-container w-[200%] h-full flex">

            <!-- 1. LOGIN SCREEN (Width 50% of 200%) -->
            <div class="w-1/2 h-full p-8 flex flex-col justify-center">
                <!-- Logo / Header -->
                <div class="text-center mb-8">
                    <div
                        class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary-light text-primary mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <h1 class="text-2xl font-semibold tracking-tight">Acknowledge</h1>
                    <p class="text-sm text-gray-500 mt-2">Sign in to your workspace</p>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="space-y-5">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                        <input type="email" id="email" name="email" required
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-light focus:border-primary outline-none transition-colors"
                            placeholder="name@company.com">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" name="password" required
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-light focus:border-primary outline-none transition-colors"
                            placeholder="••••••••">
                    </div>

                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center text-gray-500">
                            <input type="checkbox"
                                class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary-light mr-2">
                            Remember me
                        </label>
                        <a href="#" class="text-primary hover:text-primary-hover font-medium">Forgot password?</a>
                    </div>

                    <button type="submit"
                        class="w-full bg-primary text-white py-2.5 rounded-lg hover:bg-primary-hover transition-colors font-medium shadow-sm focus:ring-4 focus:ring-primary-light">
                        Sign In
                    </button>
                </form>

                <div class="mt-8 text-center">
                    <p class="text-sm text-gray-600">Don't have an account?</p>
                    <button id="toSignupBtn" class="mt-2 text-primary font-medium hover:underline">Create an
                        Account</button>
                </div>
            </div>

            <!-- 2. SIGNUP / ROLE SELECTION SCREEN (Width 50% of 200%) -->
            <div class="w-1/2 h-full p-8 flex flex-col overflow-y-auto">
                <div class="flex items-center mb-6">
                    <button id="backToLoginBtn" class="p-2 text-gray-400 hover:text-gray-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg>
                    </button>
                    <h2 class="text-xl font-semibold ml-2">Create Account</h2>
                </div>

                <!-- Steps Container -->
                <div id="signupSteps">

                    <!-- Step 1: Role Selection -->
                    <div id="step-role" class="block animation-fade">
                        <p class="text-sm text-gray-500 mb-4">Select your role to continue:</p>

                        <div class="space-y-3">
                            <!-- Card 1: Employee -->
                            <div onclick="selectRole('employee')"
                                class="group cursor-pointer border border-gray-200 rounded-xl p-4 hover:border-primary hover:bg-primary-light/10 transition-all flex items-center">
                                <div
                                    class="w-10 h-10 rounded-full bg-green-100 text-green-600 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                    </svg>
                                </div>
                                <div class="ml-4">
                                    <h3 class="font-medium text-gray-900">Employee</h3>
                                    <p class="text-xs text-gray-500">Access tasks & raise concerns</p>
                                </div>
                            </div>

                            <!-- Card 2: Manager -->
                            <div onclick="selectRole('manager')"
                                class="group cursor-pointer border border-gray-200 rounded-xl p-4 hover:border-blue-500 hover:bg-blue-50 transition-all flex items-center">
                                <div
                                    class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center group-hover:bg-blue-500 group-hover:text-white transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                                    </svg>
                                </div>
                                <div class="ml-4">
                                    <h3 class="font-medium text-gray-900">Manager</h3>
                                    <p class="text-xs text-gray-500">Manage teams & projects</p>
                                </div>
                            </div>

                            <!-- Card 3: Senior -->
                            <div onclick="selectRole('senior')"
                                class="group cursor-pointer border border-gray-200 rounded-xl p-4 hover:border-purple-500 hover:bg-purple-50 transition-all flex items-center">
                                <div
                                    class="w-10 h-10 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center group-hover:bg-purple-500 group-hover:text-white transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                                    </svg>
                                </div>
                                <div class="ml-4">
                                    <h3 class="font-medium text-gray-900">Senior Leadership</h3>
                                    <p class="text-xs text-gray-500">Global analytics & audit</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Step 2: Form (Initially Hidden) -->
                    <div id="step-form" class="hidden">
                        <div class="mb-4">
                            <span class="text-xs font-semibold uppercase tracking-wide text-gray-400">Selected
                                Role</span>
                            <div class="mt-1 flex items-center text-sm font-medium text-primary">
                                <span id="selectedRoleDisplay">Employee</span>
                                <button onclick="resetRoleSelection()"
                                    class="ml-2 text-xs text-gray-400 hover:text-gray-600 underline">Change</button>
                            </div>
                        </div>

                        <form id="signupForm" class="space-y-4">
                            <input type="hidden" id="signupRole" name="role">

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                                <input type="text" id="fullname" required
                                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-light focus:border-primary outline-none"
                                    placeholder="John Doe">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" id="signupEmail" required
                                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-light focus:border-primary outline-none"
                                    placeholder="john@example.com">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <input type="password" id="signupPassword" required
                                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-light focus:border-primary outline-none"
                                    placeholder="Create a password">
                            </div>

                            <button type="submit"
                                class="w-full bg-gray-900 text-white py-2.5 rounded-lg hover:bg-black transition-colors font-medium shadow-sm mt-2">
                                Create Account
                            </button>
                        </form>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- Link JS -->
    <script src="../static/js/api.js"></script>
    <script src="../static/js/auth.js"></script>
</body>

</html>
